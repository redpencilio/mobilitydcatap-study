version: "3.9"

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  identifier:
    image: semtech/mu-identifier:1.11.0
    environment:
      SESSION_COOKIE_SECURE: "false"
      DEFAULT_MU_AUTH_ALLOWED_GROUPS_HEADER: >-
        [{"variables":[],"name":"public"}]
    links:
      - dispatcher:dispatcher
    logging: *logging

  dispatcher:
    image: semtech/mu-dispatcher:2.1.0
    volumes:
      - ./config/dispatcher:/config
    links:
      - resource:resource
      - frontend:frontend
      - reports:reports
    logging: *logging

  frontend:
    build: ./frontend
    logging: *logging

  resource:
    image: semtech/mu-cl-resources:1.27.2
    environment:
      MU_SPARQL_ENDPOINT: "http://triplestore:8890/sparql"
      MU_APPLICATION_GRAPH: "http://mu.semte.ch/application"
    volumes:
      - ./config/resources:/config
    links:
      - triplestore:triplestore
    logging: *logging

  triplestore:
    image: redpencil/virtuoso:1.3.0
    environment:
      SPARQL_UPDATE: "true"
      DEFAULT_GRAPH: "http://mu.semte.ch/application"
    volumes:
      - ./data/db:/data
    logging: *logging

  delta-notifier:
    image: semtech/mu-delta-notifier:0.4.0
    volumes:
      - ./config/delta:/config
    links:
      - job-runner:job-runner
    logging: *logging

  job-runner:
    build: ./services/job-runner
    environment:
      VALIDATION_SERVICE_URL: "http://validation"
    links:
      - validation:validation
    logging: *logging

  validation:
    build: ./services/validation
    environment:
      SPARQL_ENDPOINT: "http://triplestore:8890/sparql"
      REPORTS_DIR: "/reports"
      BASE_REPORT_URL: "http://localhost/reports"
    volumes:
      - ./data/reports:/reports
    links:
      - triplestore:triplestore
    logging: *logging

  reports:
    image: nginx:alpine
    volumes:
      - ./data/reports:/usr/share/nginx/html/reports:ro
      - ./config/reports-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging: *logging
